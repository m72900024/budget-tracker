<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計畫經費追蹤系統（離線版）</title>
  <script src="https://cdn.tailwindcss.com" onerror="document.getElementById('tw-fallback').disabled=false"></script>
  <script>
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: {
          colors: { primary: '#4f46e5', secondary: '#10b981', warning: '#f59e0b', danger: '#ef4444' },
          fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] }
        }}
      }
    }
  </script>
  <!-- Fallback CSS when Tailwind CDN is unavailable (offline mode) -->
  <style id="tw-fallback" disabled>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .hidden { display: none !important; }
    .container { width: 100%; max-width: 72rem; margin: 0 auto; }
    .flex { display: flex; } .flex-1 { flex: 1 1 0%; } .flex-wrap { flex-wrap: wrap; }
    .grid { display: grid; } .grid-cols-1 { grid-template-columns: 1fr; }
    .grid-cols-2 { grid-template-columns: repeat(2, 1fr); } .grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
    .gap-2 { gap: 0.5rem; } .gap-3 { gap: 0.75rem; } .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; }
    .p-3 { padding: 0.75rem; } .p-4 { padding: 1rem; } .p-5 { padding: 1.25rem; } .p-6 { padding: 1.5rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; } .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; } .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .m-4 { margin: 1rem; } .mb-1 { margin-bottom: 0.25rem; } .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; } .mb-4 { margin-bottom: 1rem; } .mb-6 { margin-bottom: 1.5rem; }
    .mt-1 { margin-top: 0.25rem; } .mt-3 { margin-top: 0.75rem; } .mt-4 { margin-top: 1rem; }
    .min-h-screen { min-height: 100vh; }
    .w-full { width: 100%; } .max-w-md { max-width: 28rem; } .max-w-6xl { max-width: 72rem; }
    .items-center { align-items: center; } .items-start { align-items: start; }
    .justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
    .text-center { text-align: center; }
    .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.875rem; } .text-lg { font-size: 1.125rem; }
    .text-xl { font-size: 1.25rem; } .text-2xl { font-size: 1.5rem; } .text-3xl { font-size: 1.875rem; }
    .font-medium { font-weight: 500; } .font-bold { font-weight: 700; } .font-extrabold { font-weight: 800; }
    .rounded-lg { border-radius: 0.5rem; } .rounded-xl { border-radius: 0.75rem; } .rounded-full { border-radius: 9999px; }
    .border { border: 1px solid #d1d5db; } .border-2 { border: 2px solid #d1d5db; } .border-dashed { border-style: dashed; }
    .border-transparent { border-color: transparent; }
    .overflow-hidden { overflow: hidden; } .overflow-y-auto { overflow-y: auto; }
    .bg-white { background: white; } .bg-gray-50 { background: #f9fafb; } .bg-gray-200 { background: #e5e7eb; }
    .bg-gray-700 { background: #374151; } .bg-gray-800 { background: #1f2937; } .bg-gray-900 { background: #111827; }
    .text-white { color: white; } .text-gray-400 { color: #9ca3af; } .text-gray-500 { color: #6b7280; }
    .text-gray-600 { color: #4b5563; } .text-gray-700 { color: #374151; } .text-gray-800 { color: #1f2937; }
    .text-primary, .text-indigo-400 { color: #4f46e5; } .text-secondary { color: #10b981; }
    .text-warning { color: #f59e0b; } .text-danger { color: #ef4444; }
    .bg-primary { background: #4f46e5; } .bg-secondary { background: #10b981; } .bg-warning { background: #f59e0b; }
    .bg-green-100 { background: #dcfce7; } .bg-green-500 { background: #22c55e; }
    .bg-red-100 { background: #fee2e2; } .bg-red-500 { background: #ef4444; }
    .bg-blue-100 { background: #dbeafe; } .bg-blue-500 { background: #3b82f6; }
    .bg-yellow-100 { background: #fef9c3; } .bg-yellow-500 { background: #eab308; }
    .bg-purple-100 { background: #f3e8ff; } .bg-purple-600 { background: #9333ea; }
    .bg-teal-100 { background: #ccfbf1; }
    .text-green-700 { color: #15803d; } .text-red-700 { color: #b91c1c; } .text-blue-700 { color: #1d4ed8; }
    .text-purple-700 { color: #7e22ce; } .text-teal-700 { color: #0f766e; }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,.1); } .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0,0,0,.25); }
    .transition { transition: all 0.15s ease; }
    .cursor-pointer { cursor: pointer; } .cursor-grab { cursor: grab; }
    .space-y-2 > * + * { margin-top: 0.5rem; } .space-y-3 > * + * { margin-top: 0.75rem; } .space-y-4 > * + * { margin-top: 1rem; }
    .col-span-full { grid-column: 1 / -1; }
    .border-gray-300 { border-color: #d1d5db; }
    input, select, button { font-family: inherit; font-size: inherit; }
    input[type="text"], input[type="number"], input[type="date"], select { border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 0.75rem; width: 100%; }
    button { cursor: pointer; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; }
    .dark .bg-gray-900 { background: #111827; } .dark .bg-gray-800 { background: #1f2937; }
    .dark .bg-gray-700 { background: #374151; } .dark .text-white { color: white; }
    .dark .text-gray-300 { color: #d1d5db; } .dark .text-gray-400 { color: #9ca3af; }
    .dark input, .dark select { background: #374151; color: white; border-color: #4b5563; }
    @media (min-width: 768px) { .md\\:grid-cols-2 { grid-template-columns: repeat(2,1fr); } .md\\:grid-cols-4 { grid-template-columns: repeat(4,1fr); } .md\\:p-8 { padding: 2rem; } .md\\:flex-row { flex-direction: row; } }
    @media (min-width: 1280px) { .xl\\:grid-cols-3 { grid-template-columns: repeat(3,1fr); } }
  </style>
  <style>
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
    .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.06); }
    .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s }
    .modal-backdrop.open { opacity:1;pointer-events:auto }
    .modal-backdrop.open .modal-box { transform:scale(1);opacity:1 }
    .modal-box { transform:scale(.95);opacity:0;transition:all .3s;max-height:90vh;overflow-y:auto }
    .progress-bar { transition: width 0.5s ease; }
    .toast { animation: slideIn .3s ease, fadeOut .3s ease 2.7s forwards; }
    @keyframes slideIn { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }
    @keyframes fadeOut { to { opacity:0; transform: translateX(50%) } }
    .cat-dragging { opacity: 0.5; }
    .cat-drag-over { border-color: #4f46e5 !important; background: #eef2ff !important; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .card-shadow { box-shadow: none !important; border: 1px solid #ddd !important; }
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[999] space-y-2" aria-live="polite" role="status"></div>

  <!-- ===== 主應用容器 ===== -->
  <div id="app-container" class="hidden">
    <div class="container mx-auto p-4 md:p-8 max-w-6xl">
      <!-- Header -->
      <header class="mb-8 no-print">
        <div class="flex justify-between items-center flex-wrap gap-3">
          <h1 class="text-3xl font-extrabold text-primary dark:text-indigo-400 flex items-center gap-2">💰 計畫經費追蹤系統</h1>
          <div class="flex gap-2 flex-wrap items-center">
            <button onclick="toggleDarkMode()" id="dark-toggle" aria-label="切換深色模式" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 font-bold py-2 px-3 rounded-lg text-sm transition">🌙</button>
            <button onclick="showVendorModal()" aria-label="廠商管理" class="bg-purple-100 dark:bg-purple-900 hover:bg-purple-200 text-purple-700 dark:text-purple-300 font-bold py-2 px-4 rounded-lg text-sm transition">🏪 廠商</button>
            <button onclick="showBackupModal()" aria-label="備份管理" class="bg-orange-100 dark:bg-orange-900 hover:bg-orange-200 text-orange-700 dark:text-orange-300 font-bold py-2 px-4 rounded-lg text-sm transition">📦 備份</button>
            <button onclick="showTemplateModal()" aria-label="模板" class="bg-blue-100 dark:bg-blue-900 hover:bg-blue-200 text-blue-700 dark:text-blue-300 font-bold py-2 px-4 rounded-lg text-sm transition">📋 模板</button>
            <button onclick="printReport()" aria-label="列印報表" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-2 px-4 rounded-lg text-sm transition">🖨️ 列印</button>
            <button onclick="exportCSV()" aria-label="匯出CSV" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-2 px-4 rounded-lg text-sm transition">📊 匯出CSV</button>
            <button onclick="importCSV()" aria-label="匯入CSV" class="bg-teal-100 dark:bg-teal-900 hover:bg-teal-200 text-teal-700 dark:text-teal-300 font-bold py-2 px-4 rounded-lg text-sm transition">📥 CSV匯入</button>
            <button onclick="exportAll()" aria-label="匯出JSON" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-2 px-4 rounded-lg text-sm transition">📤 JSON匯出</button>
            <button onclick="importAll()" aria-label="匯入JSON" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-2 px-4 rounded-lg text-sm transition">📥 JSON匯入</button>
            <input type="file" id="import-file" accept=".json" class="hidden">
            <input type="file" id="import-csv-file" accept=".csv" class="hidden">
          </div>
        </div>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">管理各項計畫預算與核銷進度（離線版，資料存於瀏覽器）</p>
      </header>

      <!-- ===== 面板 ===== -->
      <div id="dashboard-view">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-white dark:bg-gray-800 p-4 rounded-xl card-shadow text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">計畫數</p>
            <p id="stat-projects" class="text-3xl font-extrabold text-primary dark:text-indigo-400">0</p>
          </div>
          <div class="bg-white dark:bg-gray-800 p-4 rounded-xl card-shadow text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">總預算</p>
            <p id="stat-budget" class="text-3xl font-extrabold text-secondary">0</p>
          </div>
          <div class="bg-white dark:bg-gray-800 p-4 rounded-xl card-shadow text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">已核銷</p>
            <p id="stat-used" class="text-3xl font-extrabold text-warning">0</p>
          </div>
          <div class="bg-white dark:bg-gray-800 p-4 rounded-xl card-shadow text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">剩餘</p>
            <p id="stat-remain" class="text-3xl font-extrabold text-danger">0</p>
          </div>
        </div>

        <!-- 圓餅圖 + 搜尋 -->
        <div class="flex flex-col md:flex-row gap-4 mb-6 no-print">
          <div id="pie-container" class="bg-white dark:bg-gray-800 p-4 rounded-xl card-shadow flex-shrink-0 hidden">
            <canvas id="pie-chart" width="180" height="180"></canvas>
          </div>
          <div class="flex-1 space-y-3">
            <label for="dashboard-search" class="sr-only">搜尋計畫</label>
            <input type="text" id="dashboard-search" placeholder="🔍 搜尋計畫名稱..." class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg" oninput="renderDashboard()">
            <!-- 年度篩選 -->
            <div class="flex gap-2 flex-wrap" id="year-tags"></div>
          </div>
        </div>

        <div id="project-cards" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>

        <div class="mt-6 text-center no-print">
          <button onclick="showAddProjectModal()" aria-label="新增計畫" class="bg-primary hover:bg-indigo-600 text-white font-bold py-3 px-8 rounded-xl text-lg transition shadow-lg">＋ 新增計畫</button>
        </div>
      </div>

      <!-- ===== 計畫詳情 ===== -->
      <div id="detail-view" class="hidden">
        <button onclick="backToDashboard()" class="mb-4 text-primary dark:text-indigo-400 hover:underline font-bold flex items-center gap-1 no-print">← 回到總覽</button>

        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl card-shadow mb-6">
          <div class="flex justify-between items-start flex-wrap gap-3">
            <div>
              <h2 id="detail-title" class="text-2xl font-extrabold text-gray-800 dark:text-white"></h2>
              <p id="detail-desc" class="text-gray-500 dark:text-gray-400 mt-1"></p>
              <p id="detail-deadline" class="text-sm mt-1"></p>
            </div>
            <div class="flex gap-2 no-print">
              <button onclick="editCurrentProject()" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-2 px-4 rounded-lg text-sm transition">✏️ 編輯</button>
              <button onclick="deleteCurrentProject()" class="bg-red-100 dark:bg-red-900 hover:bg-red-200 text-danger font-bold py-2 px-4 rounded-lg text-sm transition">🗑️ 刪除</button>
            </div>
          </div>
          <div class="mt-4">
            <div class="flex justify-between text-sm mb-1">
              <span id="detail-used-label" class="text-gray-600 dark:text-gray-300"></span>
              <span id="detail-remain-label" class="text-gray-600 dark:text-gray-300"></span>
            </div>
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-4">
              <div id="detail-progress" class="progress-bar bg-primary rounded-full h-4" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
          </div>
        </div>

        <div id="categories-list" class="space-y-4"></div>

        <div class="mt-4 no-print">
          <button onclick="showAddCategoryModal()" aria-label="新增經費類別" class="bg-secondary hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-lg transition">＋ 新增經費類別</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: 計畫 -->
  <div id="modal-project" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 id="modal-project-title" class="text-xl font-bold dark:text-white mb-4">新增計畫</h3>
      <div class="space-y-3">
        <div>
          <label for="inp-project-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">計畫名稱</label>
          <input type="text" id="inp-project-name" placeholder="例：數位學習計畫" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg" onkeydown="if(event.key==='Enter')saveProject()">
        </div>
        <div>
          <label for="inp-project-desc" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">說明（選填）</label>
          <input type="text" id="inp-project-desc" placeholder="例：112年度教育部補助" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-project-year" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">年度/學期（選填）</label>
          <input type="text" id="inp-project-year" placeholder="例：114學年" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-project-deadline" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">結案期限（選填）</label>
          <input type="date" id="inp-project-deadline" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button onclick="saveProject()" class="flex-1 bg-primary hover:bg-indigo-600 text-white font-bold py-3 rounded-lg transition">儲存</button>
        <button onclick="closeAllModals()" class="flex-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">取消</button>
      </div>
    </div>
  </div>

  <!-- Modal: 經費類別 -->
  <div id="modal-category" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 id="modal-category-title" class="text-xl font-bold dark:text-white mb-4">新增經費類別</h3>
      <div class="space-y-3">
        <div>
          <label for="inp-cat-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">類別名稱</label>
          <input type="text" id="inp-cat-name" placeholder="例：人事費" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-cat-budget" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">預算金額</label>
          <input type="number" step="0.1" id="inp-cat-budget" placeholder="50000" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg" onkeydown="if(event.key==='Enter')saveCategory()">
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button onclick="saveCategory()" class="flex-1 bg-secondary hover:bg-emerald-600 text-white font-bold py-3 rounded-lg transition">儲存</button>
        <button onclick="closeAllModals()" class="flex-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">取消</button>
      </div>
    </div>
  </div>

  <!-- Modal: 核銷項目 -->
  <div id="modal-expense" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 id="modal-expense-title" class="text-xl font-bold dark:text-white mb-4">新增核銷項目</h3>
      <div class="space-y-3">
        <div>
          <label for="inp-exp-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">項目名稱</label>
          <input type="text" id="inp-exp-name" placeholder="例：講師鐘點費" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-exp-amount" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">金額</label>
          <input type="number" step="0.1" id="inp-exp-amount" placeholder="3000" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-exp-vendor" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">廠商</label>
          <div class="flex gap-2">
            <select id="inp-exp-vendor" class="flex-1 p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg"><option value="">-- 不指定 --</option></select>
            <button onclick="quickAddVendor()" aria-label="快速新增廠商" class="bg-purple-100 dark:bg-purple-900 hover:bg-purple-200 text-purple-700 dark:text-purple-300 font-bold px-3 rounded-lg text-sm transition">＋</button>
          </div>
        </div>
        <div>
          <label for="inp-exp-date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">日期</label>
          <input type="date" id="inp-exp-date" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-exp-receipt" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">收據編號（選填）</label>
          <input type="text" id="inp-exp-receipt" placeholder="例：A-001" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
        <div>
          <label for="inp-exp-status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">核銷狀態</label>
          <select id="inp-exp-status" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
            <option value="pending">⏳ 待核銷</option>
            <option value="submitted">📝 已送件</option>
            <option value="approved">✅ 已核銷</option>
            <option value="rejected">❌ 退件</option>
          </select>
        </div>
        <div>
          <label for="inp-exp-note" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">備註（選填）</label>
          <input type="text" id="inp-exp-note" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg">
        </div>
      </div>
      <div class="flex gap-2 mt-5">
        <button onclick="saveExpense()" class="flex-1 bg-warning hover:bg-amber-600 text-white font-bold py-3 rounded-lg transition">儲存</button>
        <button onclick="closeAllModals()" class="flex-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">取消</button>
      </div>
    </div>
  </div>

  <!-- Modal: 廠商管理 -->
  <div id="modal-vendor" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 class="text-xl font-bold dark:text-white mb-4">🏪 廠商管理</h3>
      <div class="flex gap-2 mb-4">
        <label for="inp-vendor-name" class="sr-only">廠商名稱</label>
        <input type="text" id="inp-vendor-name" placeholder="廠商名稱" class="flex-1 p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg" onkeydown="if(event.key==='Enter')addVendor()">
        <button onclick="addVendor()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-4 rounded-lg transition">新增</button>
      </div>
      <div id="vendor-list" class="space-y-2 max-h-[50vh] overflow-y-auto"></div>
      <div class="mt-4">
        <button onclick="closeAllModals()" class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">關閉</button>
      </div>
    </div>
  </div>

  <!-- Modal: 計畫模板 -->
  <div id="modal-template" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 class="text-xl font-bold dark:text-white mb-4">📋 從模板建立計畫</h3>
      <div id="template-list" class="space-y-3"></div>
      <div class="mt-4">
        <button onclick="closeAllModals()" class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">關閉</button>
      </div>
    </div>
  </div>

  <!-- Modal: 備份管理 -->
  <div id="modal-backup" class="modal-backdrop" role="dialog" aria-modal="true" onclick="if(event.target===this)closeAllModals()">
    <div class="modal-box bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-md m-4 p-6">
      <h3 class="text-xl font-bold dark:text-white mb-4">📦 備份管理</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">系統每次儲存時自動備份，最多保留 7 天。</p>
      <div id="backup-list" class="space-y-2 max-h-[50vh] overflow-y-auto"></div>
      <div class="mt-4">
        <button onclick="closeAllModals()" class="w-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 text-gray-700 dark:text-gray-200 font-bold py-3 rounded-lg transition">關閉</button>
      </div>
    </div>
  </div>

  <script>
  /* ============================================================
   *  config.js - 常數設定
   * ============================================================ */
  const STORAGE_KEY = 'budget-tracker-data';

  const statusMap = {
    pending:   { label:'⏳ 待核銷', color:'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300' },
    submitted: { label:'📝 已送件', color:'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' },
    approved:  { label:'✅ 已核銷', color:'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300' },
    rejected:  { label:'❌ 退件',   color:'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300' }
  };

  // 狀態標籤 → key 的反向對應（CSV 匯入用）
  const statusLabelToKey = {};
  Object.entries(statusMap).forEach(([k, v]) => {
    statusLabelToKey[v.label] = k;
    // 也支援純文字比對
    statusLabelToKey[v.label.replace(/^[^\u4e00-\u9fff]+/, '')] = k;
  });
  statusLabelToKey['待核銷'] = 'pending';
  statusLabelToKey['已送件'] = 'submitted';
  statusLabelToKey['已核銷'] = 'approved';
  statusLabelToKey['退件'] = 'rejected';

  /* ============================================================
   *  app.js - 啟動邏輯 + 全域事件 + 深色模式 + Toast + 工具函數
   * ============================================================ */
  window.BT = {
    data: { projects: [], vendors: [] },
    currentProjectId: null,
    editingProjectId: null,
    editingCategoryId: null,
    editingExpenseInfo: null,
    collapsedCats: new Set(),
    yearFilter: '',
    save: null
  };

  function uid() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }
  function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return Number(n).toLocaleString('zh-TW', {minimumFractionDigits:0, maximumFractionDigits:1}); }

  function calcCat(cat) {
    const u = cat.expenses.reduce((s,e) => s + (e.amount||0), 0);
    return { budget: cat.budget||0, used: u, remain: (cat.budget||0) - u };
  }

  function calcProj(proj) {
    let b=0, u=0;
    proj.categories.forEach(c => { const r=calcCat(c); b+=r.budget; u+=r.used; });
    return { budget:b, used:u, remain:b-u, percent: b>0 ? Math.round(u/b*100) : 0 };
  }

  function calcAll() {
    let b=0, u=0;
    BT.data.projects.forEach(p => { const c=calcProj(p); b+=c.budget; u+=c.used; });
    return { budget:b, used:u, remain:b-u };
  }

  function getProject(id) {
    return BT.data.projects.find(p => p.id === (id || BT.currentProjectId));
  }

  function toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const colors = { success:'bg-green-500', error:'bg-red-500', warning:'bg-yellow-500', info:'bg-blue-500' };
    const div = document.createElement('div');
    div.className = `toast ${colors[type]||colors.info} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-bold`;
    div.textContent = msg;
    c.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  function closeAllModals() {
    document.querySelectorAll('.modal-backdrop').forEach(m => m.classList.remove('open'));
  }

  window.toggleDarkMode = function() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark'));
    document.getElementById('dark-toggle').textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  };

  function initDarkMode() {
    if (localStorage.getItem('dark-mode') === 'true') {
      document.documentElement.classList.add('dark');
    }
    const btn = document.getElementById('dark-toggle');
    if (btn) btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllModals(); });

  BT.init = function() {
    initDarkMode();
    loadFromLocal();
    document.getElementById('app-container').classList.remove('hidden');
    renderDashboard();
  };

  /* ============================================================
   *  db.js - 純 localStorage 資料層
   * ============================================================ */
  function loadFromLocal() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      try {
        const d = JSON.parse(raw);
        BT.data.projects = d.projects || [];
        BT.data.vendors = d.vendors || [];
        BT.data.projects.forEach(p => {
          if (!p.year) p.year = '';
          if (!p.deadline) p.deadline = '';
        });
      } catch (e) {
        console.error('localStorage parse error:', e);
      }
    }
  }

  BT.save = function() {
    const payload = JSON.stringify({ projects: BT.data.projects, vendors: BT.data.vendors });
    localStorage.setItem(STORAGE_KEY, payload);
    // 自動備份：每日一份，最多保留 7 天
    const today = new Date().toISOString().split('T')[0];
    const backupKey = 'budget-tracker-backup-' + today;
    localStorage.setItem(backupKey, payload);
    // 清理超過 7 天的備份
    const keep = 7;
    const allKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('budget-tracker-backup-')) allKeys.push(k);
    }
    allKeys.sort();
    while (allKeys.length > keep) { localStorage.removeItem(allKeys.shift()); }
  };

  /* ============================================================
   *  dashboard.js - 面板渲染 + 圓餅圖 + 年度篩選 + 搜尋
   * ============================================================ */
  function drawPie() {
    const canvas = document.getElementById('pie-chart');
    const pieContainer = document.getElementById('pie-container');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const size = 180, cx = size/2, cy = size/2, r = 70;
    ctx.clearRect(0, 0, size, size);

    const slices = [];
    BT.data.projects.forEach(p => {
      const c = calcProj(p);
      if (c.budget > 0) slices.push({ name: p.name, value: c.budget, used: c.used });
    });

    if (slices.length === 0) {
      if (pieContainer) pieContainer.classList.add('hidden');
      return;
    }
    if (pieContainer) pieContainer.classList.remove('hidden');

    const total = slices.reduce((s,d) => s+d.value, 0);
    const colors = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];
    let angle = -Math.PI/2;

    slices.forEach((s, i) => {
      const sweep = (s.value/total) * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, angle, angle+sweep); ctx.closePath();
      ctx.fillStyle = colors[i % colors.length]; ctx.fill();
      if (sweep > 0.3) {
        const mid = angle + sweep/2;
        const lx = cx + Math.cos(mid) * (r * 0.65);
        const ly = cy + Math.sin(mid) * (r * 0.65);
        ctx.fillStyle = 'white'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(Math.round(s.value/total*100)+'%', lx, ly+4);
      }
      angle += sweep;
    });
  }

  function renderYearTags() {
    const years = [...new Set(BT.data.projects.map(p => p.year).filter(y => y))];
    const container = document.getElementById('year-tags');
    if (!container) return;
    container.innerHTML = '';
    if (years.length === 0) return;

    const allBtn = document.createElement('button');
    allBtn.className = `px-3 py-1 rounded-full text-xs font-bold transition ${!BT.yearFilter ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-300'}`;
    allBtn.textContent = '全部';
    allBtn.onclick = () => { BT.yearFilter = ''; renderDashboard(); };
    container.appendChild(allBtn);

    years.sort().forEach(y => {
      const btn = document.createElement('button');
      btn.className = `px-3 py-1 rounded-full text-xs font-bold transition ${BT.yearFilter===y ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-300'}`;
      btn.textContent = y;
      btn.onclick = () => { BT.yearFilter = y; renderDashboard(); };
      container.appendChild(btn);
    });
  }

  function renderDashboard() {
    const all = calcAll();
    document.getElementById('stat-projects').textContent = BT.data.projects.length;
    document.getElementById('stat-budget').textContent = '$' + fmt(all.budget);
    document.getElementById('stat-used').textContent = '$' + fmt(all.used);
    document.getElementById('stat-remain').textContent = '$' + fmt(all.remain);

    renderYearTags();
    drawPie();

    const container = document.getElementById('project-cards');
    container.innerHTML = '';
    const search = (document.getElementById('dashboard-search')?.value || '').toLowerCase();
    const filtered = BT.data.projects.filter(p => {
      if (search && !p.name.toLowerCase().includes(search) && !(p.desc||'').toLowerCase().includes(search)) return false;
      if (BT.yearFilter && p.year !== BT.yearFilter) return false;
      return true;
    });

    if (filtered.length === 0) {
      container.innerHTML = BT.data.projects.length === 0
        ? '<div class="col-span-full text-center py-4 text-gray-400"><p class="text-4xl mb-2">📋</p><p class="text-lg">尚無計畫，點擊下方按鈕新增</p></div>'
        : '<div class="col-span-full text-center py-4 text-gray-400"><p class="text-lg">找不到符合的計畫</p></div>';
      return;
    }

    filtered.forEach(proj => {
      const c = calcProj(proj);
      const catCount = proj.categories.length;
      const expCount = proj.categories.reduce((s, cat) => s + cat.expenses.length, 0);
      let approvedAmt = 0, pendingAmt = 0;
      proj.categories.forEach(cat => cat.expenses.forEach(e => {
        if (e.status === 'approved') approvedAmt += (e.amount||0);
        else pendingAmt += (e.amount||0);
      }));
      const progressColor = c.percent > 90 ? 'bg-danger' : c.percent > 70 ? 'bg-warning' : 'bg-primary';

      let deadlineHtml = '';
      if (proj.deadline) {
        const today = new Date(); today.setHours(0,0,0,0);
        const dl = new Date(proj.deadline + "T00:00:00");
        const days = Math.ceil((dl - today) / (1000*60*60*24));
        if (days < 0) deadlineHtml = `<span class="text-xs text-danger font-bold">⚠️ 已逾期 ${-days} 天</span>`;
        else if (days <= 30) deadlineHtml = `<span class="text-xs text-warning font-bold">⏰ 剩 ${days} 天結案</span>`;
        else deadlineHtml = `<span class="text-xs text-gray-400">📅 ${proj.deadline}</span>`;
      }

      const card = document.createElement('div');
      card.className = 'bg-white dark:bg-gray-800 p-6 rounded-xl card-shadow hover:shadow-lg transition cursor-pointer transform hover:scale-[1.02]';
      card.onclick = () => openProject(proj.id);
      card.innerHTML = `
        <div class="flex justify-between items-start mb-2">
          <div>
            <h3 class="text-xl font-bold text-gray-800 dark:text-white">${escapeHtml(proj.name)}</h3>
            ${proj.year ? `<span class="text-xs px-2 py-0.5 bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300 rounded-full">${escapeHtml(proj.year)}</span>` : ''}
          </div>
          <span class="text-xs px-2 py-1 rounded-full ${c.percent>90?'bg-red-100 text-danger':c.percent>70?'bg-yellow-100 text-warning':'bg-green-100 text-secondary'} font-bold">${c.percent}%</span>
        </div>
        ${proj.desc ? `<p class="text-sm text-gray-500 dark:text-gray-400 mb-1">${escapeHtml(proj.desc)}</p>` : ''}
        ${deadlineHtml ? `<div class="mb-2">${deadlineHtml}</div>` : ''}
        <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-3 mb-3">
          <div class="progress-bar ${progressColor} rounded-full h-3" style="width:${Math.min(c.percent,100)}%"></div>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center text-sm">
          <div><p class="text-gray-400">預算</p><p class="font-bold text-gray-800 dark:text-white">$${fmt(c.budget)}</p></div>
          <div><p class="text-gray-400">已用</p><p class="font-bold text-warning">$${fmt(c.used)}</p></div>
          <div><p class="text-gray-400">剩餘</p><p class="font-bold ${c.remain<0?'text-danger':'text-secondary'}">$${fmt(c.remain)}</p></div>
        </div>
        <div class="mt-3 pt-3 border-t dark:border-gray-700 flex justify-between text-xs text-gray-400">
          <span>${catCount} 個類別 · ${expCount} 筆</span>
          <span>✅$${fmt(approvedAmt)} · ⏳$${fmt(pendingAmt)}</span>
        </div>`;
      container.appendChild(card);
    });
  }

  function openProject(id) {
    BT.currentProjectId = id;
    document.getElementById('dashboard-view').classList.add('hidden');
    document.getElementById('detail-view').classList.remove('hidden');
    renderDetail();
  }

  function backToDashboard() {
    BT.currentProjectId = null;
    document.getElementById('detail-view').classList.add('hidden');
    document.getElementById('dashboard-view').classList.remove('hidden');
    renderDashboard();
  }

  function showAddProjectModal() {
    BT.editingProjectId = null;
    document.getElementById('modal-project-title').textContent = '新增計畫';
    ['inp-project-name','inp-project-desc','inp-project-year','inp-project-deadline'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-project').classList.add('open');
    document.getElementById('inp-project-name').focus();
  }

  window.editCurrentProject = function() {
    const p = getProject(); if (!p) return;
    BT.editingProjectId = p.id;
    document.getElementById('modal-project-title').textContent = '編輯計畫';
    document.getElementById('inp-project-name').value = p.name;
    document.getElementById('inp-project-desc').value = p.desc || '';
    document.getElementById('inp-project-year').value = p.year || '';
    document.getElementById('inp-project-deadline').value = p.deadline || '';
    document.getElementById('modal-project').classList.add('open');
  };

  window.saveProject = function() {
    const name = document.getElementById('inp-project-name').value.trim();
    if (!name) return toast('請輸入計畫名稱', 'error');
    const desc = document.getElementById('inp-project-desc').value.trim();
    const year = document.getElementById('inp-project-year').value.trim();
    const deadline = document.getElementById('inp-project-deadline').value;
    if (BT.editingProjectId) {
      const p = getProject(BT.editingProjectId);
      if (p) Object.assign(p, { name, desc, year, deadline });
      toast('計畫已更新');
    } else {
      BT.data.projects.push({ id: uid(), name, desc, year, deadline, categories: [] });
      toast('計畫已建立');
    }
    BT.save(); closeAllModals();
    if (BT.currentProjectId) renderDetail();
    renderDashboard();
  };

  window.deleteCurrentProject = function() {
    if (!confirm('確定刪除此計畫？所有經費和核銷紀錄都會刪除！')) return;
    BT.data.projects = BT.data.projects.filter(p => p.id !== BT.currentProjectId);
    BT.save(); toast('計畫已刪除', 'warning'); backToDashboard();
  };

  /* ============================================================
   *  detail.js - 計畫詳情頁 + 類別 + 核銷項目 + 拖拉排序
   * ============================================================ */
  function renderDetail() {
    const proj = getProject();
    if (!proj) return backToDashboard();
    const c = calcProj(proj);
    document.getElementById('detail-title').textContent = proj.name;
    document.getElementById('detail-desc').textContent = proj.desc || '';

    const dlEl = document.getElementById('detail-deadline');
    if (proj.deadline) {
      const today = new Date(); today.setHours(0,0,0,0);
      const dl = new Date(proj.deadline + "T00:00:00");
      const days = Math.ceil((dl - today) / (1000*60*60*24));
      if (days < 0) dlEl.innerHTML = `<span class="text-danger font-bold">⚠️ 已逾期 ${-days} 天（期限：${proj.deadline}）</span>`;
      else if (days <= 30) dlEl.innerHTML = `<span class="text-warning font-bold">⏰ 剩 ${days} 天結案（期限：${proj.deadline}）</span>`;
      else dlEl.innerHTML = `<span class="text-gray-500">📅 結案期限：${proj.deadline}（剩 ${days} 天）</span>`;
    } else dlEl.textContent = '';

    document.getElementById('detail-used-label').textContent = `已用 $${fmt(c.used)} / $${fmt(c.budget)}`;
    document.getElementById('detail-remain-label').textContent = `剩餘 $${fmt(c.remain)} (${c.percent}%)`;
    const progEl = document.getElementById('detail-progress');
    progEl.style.width = Math.min(c.percent, 100) + '%';
    progEl.className = `progress-bar rounded-full h-4 ${c.percent>90?'bg-danger':c.percent>70?'bg-warning':'bg-primary'}`;
    progEl.setAttribute('aria-valuenow', c.percent);

    const list = document.getElementById('categories-list');
    list.innerHTML = '';
    if (proj.categories.length === 0) {
      list.innerHTML = '<div class="text-center py-8 text-gray-400"><p class="text-lg">尚無經費類別</p></div>';
      return;
    }

    proj.categories.forEach((cat, catIdx) => {
      const cc = calcCat(cat);
      const pct = cc.budget > 0 ? Math.round(cc.used / cc.budget * 100) : 0;
      const progressColor = pct > 90 ? 'bg-danger' : pct > 70 ? 'bg-warning' : 'bg-secondary';
      const isCollapsed = BT.collapsedCats.has(cat.id);

      const div = document.createElement('div');
      div.className = 'bg-white dark:bg-gray-800 rounded-xl card-shadow overflow-hidden border-2 border-transparent';
      div.draggable = true;
      div.dataset.catId = cat.id;
      div.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', cat.id); div.classList.add('cat-dragging'); });
      div.addEventListener('dragend', () => div.classList.remove('cat-dragging'));
      div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('cat-drag-over'); });
      div.addEventListener('dragleave', () => div.classList.remove('cat-drag-over'));
      div.addEventListener('drop', e => {
        e.preventDefault(); div.classList.remove('cat-drag-over');
        const fromId = e.dataTransfer.getData('text/plain');
        if (fromId === cat.id) return;
        const proj = getProject();
        const fromIdx = proj.categories.findIndex(c => c.id === fromId);
        const toIdx = proj.categories.findIndex(c => c.id === cat.id);
        if (fromIdx < 0 || toIdx < 0) return;
        const [moved] = proj.categories.splice(fromIdx, 1);
        proj.categories.splice(toIdx, 0, moved);
        BT.save(); renderDetail();
        toast('類別順序已更新');
      });

      div.innerHTML = `
        <div class="p-5">
          <div class="flex justify-between items-center mb-2 cursor-pointer" onclick="toggleCat('${cat.id}')">
            <div class="flex items-center gap-2">
              <span class="text-gray-400 cursor-grab no-print" title="拖拉排序">⠿</span>
              <span class="text-sm transition-transform ${isCollapsed ? '' : 'rotate-90'}">${isCollapsed ? '▶' : '▼'}</span>
              <h3 class="text-lg font-bold text-gray-800 dark:text-white">${escapeHtml(cat.name)}</h3>
            </div>
            <div class="flex gap-2 items-center">

  // --- CSV 匯出（完整欄位） ---
  // 欄位：計畫名稱,計畫說明,計畫年度,計畫期限,類別名稱,類別預算,項目名稱,項目金額,廠商,日期,收據編號,狀態,備註
  function csvQuote(s) {
    s = String(s == null ? '' : s);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  window.exportCSV = function() {
    const header = '計畫名稱,計畫說明,計畫年度,計畫期限,類別名稱,類別預算,項目名稱,項目金額,廠商,日期,收據編號,狀態,備註';
    const rows = [header];
    BT.data.projects.forEach(p => {
      if (p.categories.length === 0) {
        // 只有計畫沒有類別，也輸出一行
        rows.push([csvQuote(p.name), csvQuote(p.desc), csvQuote(p.year), csvQuote(p.deadline),
          '','','','','','','','',''].join(','));
      }
      p.categories.forEach(c => {
        if (c.expenses.length === 0) {
          // 類別無核銷紀錄，輸出類別資訊
          rows.push([csvQuote(p.name), csvQuote(p.desc), csvQuote(p.year), csvQuote(p.deadline),
            csvQuote(c.name), c.budget, '','','','','','',''].join(','));
        }
        c.expenses.forEach(e => {
          const st = statusMap[e.status]?.label || e.status || '';
          rows.push([csvQuote(p.name), csvQuote(p.desc), csvQuote(p.year), csvQuote(p.deadline),
            csvQuote(c.name), c.budget,
            csvQuote(e.name), e.amount, csvQuote(e.vendor||''), csvQuote(e.date||''),
            csvQuote(e.receipt||''), csvQuote(st), csvQuote(e.note||'')].join(','));
        });
      });
    });
    const blob = new Blob(["\ufeff" + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `budget-report-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    toast('CSV 已匯出');
  };

  window.importCSV = function() {

  };

  function parseCSVLine(line) {
    const result = [];
    let i = 0, field = '', inQuote = false;
    while (i < line.length) {
      const ch = line[i];
      if (inQuote) {
        if (ch === '"') {
          if (i + 1 < line.length && line[i + 1] === '"') {
            field += '"';
            i += 2;
          } else {
            inQuote = false;
            i++;
          }
        } else {
          field += ch;
          i++;
        }
      } else {
        if (ch === '"') {
          inQuote = true;
          i++;
        } else if (ch === ',') {
          result.push(field);
          field = '';
          i++;
        } else {
          field += ch;
          i++;
        }
      }
    }
    result.push(field);
    return result;
  }

  function resolveStatusKey(label) {
    if (!label) return 'pending';
    const trimmed = label.trim();
    // 先查直接 key
    if (statusMap[trimmed]) return trimmed;
    // 查反向表
    if (statusLabelToKey[trimmed]) return statusLabelToKey[trimmed];
    // 模糊匹配
    for (const [k, v] of Object.entries(statusMap)) {
      if (trimmed.includes(v.label) || v.label.includes(trimmed)) return k;
    }
    return 'pending';
  }

  function initCSVImportListener() {
    document.getElementById('import-csv-file').addEventListener('change', e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        try {
          let text = ev.target.result;
          // 移除 BOM
          if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          if (lines.length < 2) throw new Error('CSV 檔案內容不足');

          // 驗證標頭
          const headerFields = parseCSVLine(lines[0]);
          const expectedFirst = '計畫名稱';
          if (headerFields[0].trim() !== expectedFirst) {
            throw new Error('CSV 標頭格式不符，第一欄應為「計畫名稱」');
          }

          // 解析資料列
          const projectMap = new Map(); // name -> project obj
          const vendorSet = new Set(BT.data.vendors);

          for (let i = 1; i < lines.length; i++) {
            const cols = parseCSVLine(lines[i]);
            if (cols.length < 5) continue;

            const [projName, projDesc, projYear, projDeadline, catName, catBudgetStr,
              expName, expAmountStr, vendor, date, receipt, statusLabel, note] = cols.map(c => (c||'').trim());

            if (!projName) continue;

            // 取得或建立計畫
            let proj = projectMap.get(projName);
            if (!proj) {
              proj = { id: uid(), name: projName, desc: projDesc || '', year: projYear || '', deadline: projDeadline || '', categories: [], _catMap: new Map() };
              projectMap.set(projName, proj);
            }

            if (!catName) continue;

            // 取得或建立類別
            let cat = proj._catMap.get(catName);
            if (!cat) {
              cat = { id: uid(), name: catName, budget: parseFloat(catBudgetStr) || 0, expenses: [] };
              proj._catMap.set(catName, cat);
              proj.categories.push(cat);
            }
            // 如果新行有更大的預算值就更新
            const newBudget = parseFloat(catBudgetStr) || 0;
            if (newBudget > 0 && newBudget !== cat.budget) cat.budget = newBudget;

            if (!expName) continue;

            // 新增核銷項目
            const amount = parseFloat(expAmountStr) || 0;
            if (vendor) vendorSet.add(vendor);
            cat.expenses.push({
              id: uid(),
              name: expName,
              amount: amount,
              vendor: vendor || '',
              date: date || '',
              receipt: receipt || '',
              status: resolveStatusKey(statusLabel),
              note: note || ''
            });
          }

          const projects = [...projectMap.values()].map(p => {
            delete p._catMap;
            return p;
          });

          if (projects.length === 0) throw new Error('未解析到任何計畫資料');

          const csvMode = confirm(`從 CSV 匯入 ${projects.length} 個計畫。\n\n按「確定」→ 取代現有資料\n按「取消」→ 合併（新增不覆蓋）`);
          if (csvMode) {
            BT.data.projects = projects;
            BT.data.vendors = [...vendorSet].sort((a, b) => a.localeCompare(b, 'zh-TW'));
          } else {
            const existingNames = new Set(BT.data.projects.map(p => p.name));
            projects.forEach(p => { if (!existingNames.has(p.name)) BT.data.projects.push(p); });
            [...vendorSet].forEach(v => { if (!BT.data.vendors.includes(v)) BT.data.vendors.push(v); });
            BT.data.vendors.sort((a, b) => a.localeCompare(b, 'zh-TW'));
          }
          BT.save();
          BT.currentProjectId = null;
          document.getElementById('detail-view').classList.add('hidden');
          document.getElementById('dashboard-view').classList.remove('hidden');
          renderDashboard();
          toast(`CSV 匯入成功：${projects.length} 個計畫`);
        } catch (err) {
          toast('CSV 匯入失敗: ' + err.message, 'error');
        }
      };
      r.readAsText(f, 'UTF-8');
      e.target.value = '';
    });
  }

  // --- 備份管理 ---
  window.showBackupModal = function() {
    const list = document.getElementById('backup-list');
    const backups = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('budget-tracker-backup-')) {
        backups.push({ key: k, date: k.replace('budget-tracker-backup-', '') });
      }
    }
    backups.sort((a, b) => b.date.localeCompare(a.date));
    if (backups.length === 0) {
      list.innerHTML = '<p class="text-gray-400 text-center py-4">尚無備份</p>';
    } else {
      list.innerHTML = backups.map(b => {
        const raw = localStorage.getItem(b.key);
        let info = '';
        try { const d = JSON.parse(raw); info = `${d.projects?.length || 0} 個計畫`; } catch(e) {}
        return `<div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 rounded-lg">
          <div>
            <span class="font-medium text-gray-800 dark:text-white">📅 ${escapeHtml(b.date)}</span>
            <span class="text-xs text-gray-400 ml-2">${escapeHtml(info)}</span>
          </div>
          <button onclick="restoreBackup('${escapeHtml(b.key)}')" class="bg-primary hover:bg-indigo-600 text-white font-bold py-1 px-3 rounded-lg text-sm transition">還原</button>
        </div>`;
      }).join('');
    }
    document.getElementById('modal-backup').classList.add('open');
  };

  window.restoreBackup = function(key) {
    if (!confirm('確定還原此備份？現有資料將被取代。')) return;
    const raw = localStorage.getItem(key);
    if (!raw) return toast('找不到備份資料', 'error');
    try {
      const d = JSON.parse(raw);
      BT.data = d;
      if (!BT.data.vendors) BT.data.vendors = [];
      BT.save();
      BT.currentProjectId = null;
      document.getElementById('detail-view').classList.add('hidden');
      document.getElementById('dashboard-view').classList.remove('hidden');
      renderDashboard();
      closeAllModals();
      toast('備份已還原');
    } catch (e) { toast('還原失敗: ' + e.message, 'error'); }
  };

  // --- 列印 ---
  window.printReport = function() { window.print(); };

  /* ============================================================
   *  啟動
   * ============================================================ */
  initImportListener();
  initCSVImportListener();
  BT.init();
  </script>
</body>
</html>
